name: Build Linux (AppImage)

# 在雲端的 Ubuntu 上打包 Linux 版（你不需要有 Linux 機器）。
# 觸發方式：
#   - 手動：Actions 分頁 → 這個 workflow → Run workflow
#   - 推 tag：git push 一個 v* 開頭的 tag，會自動打包並附到該 release
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # uiohook-napi / electron 在 Linux 編譯或執行時要的系統函式庫
      - name: System libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libxtst-dev libx11-dev libxkbcommon-dev libxinerama-dev libpng-dev build-essential

      - name: Install Node deps (rebuilds native modules for Electron via postinstall)
        run: npm install

      - name: Python venv + backend deps
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install sherpa-onnx numpy opencc edge-tts pyinstaller

      - name: Download sherpa models
        run: ./.venv/bin/python download_all_models.py

      - name: Build Python backend (PyInstaller, Linux)
        run: npm run build:backend

      - name: Build renderer
        run: npm run build:renderer

      - name: Build AppImage
        run: npx electron-builder --linux --publish never

      - name: Upload AppImage (download from this run's Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: SpeakSlow-linux-AppImage
          path: dist/*.AppImage
          if-no-files-found: error

      # 把 AppImage 掛到最新的 release（任何人不用登入就能從 release 頁下載）
      - name: Attach AppImage to the latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release view --json tagName -q .tagName)
          echo "Uploading AppImage to release $TAG"
          gh release upload "$TAG" dist/*.AppImage --clobber
