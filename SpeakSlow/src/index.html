<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>聲聲慢 - 中文語音轉文字</title>
    <style>
      /* GenWan 源雲明體 - 主字體（品牌標題） */
      @font-face {
        font-family: 'GenWan';
        src: url('./fonts/GenWanMin2TC-M.otf') format('opentype');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }

      /* jf open 粉圓 - 次字體（內容文字） */
      @font-face {
        font-family: 'OpenHuninn';
        src: url('./fonts/jf-openhuninn-2.1.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'OpenHuninn', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Micro Hei', system-ui, -apple-system, sans-serif;
        background: transparent;
        overflow: hidden;
      }

      #root {
        width: 100vw;
        height: 100vh;
        background: transparent;
      }

      /* 中文字体优化 - 使用 jf open 粉圓 */
      .chinese-text {
        font-family: 'OpenHuninn', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Micro Hei', sans-serif;
        line-height: 1.6;
        letter-spacing: 0.02em;
      }
      
      /* 防止文本选择 */
      .no-select {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
      
      /* 自定义滚动条 */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.1);
        border-radius: 3px;
      }
      
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 3px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
